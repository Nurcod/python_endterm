<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    body {
        margin: 0;
        display: flex;
        justify-content: center; /* Центр по горизонтали */
        align-items: center;     /* Центр по вертикали */
        min-height: 100vh;
        background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        font-family: 'Segoe UI', sans-serif;
    }

    .chat-card {
        background: white;
        padding: 40px;
        padding-top: 80px;
        border-radius: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        position: relative;
        /* Устанавливаем фиксированную ширину, чтобы колонки не сжимались */
        width: 100%;
        max-width: 800px; 
        margin: 20px;
    }

    .chat-card::before {
        content: "NUR_TRANSLATOR";
        position: absolute;
        top: 30px;
        left: 40px;
        font-size: 24px;
        font-weight: 900;
        color: #0d6efd;
        letter-spacing: 1px;
    }

    /* Делаем поля ввода и вывода одинаковыми и красивыми */
    textarea.form-control, .response-box {
        min-height: 300px; /* Увеличил высоту для удобства */
        border-radius: 15px !important;
        border: 1px solid #e9ecef !important;
        background-color: #f8f9fa !important;
        padding: 20px !important;
        font-size: 16px;
    }

    textarea.form-control:focus {
        background-color: #fff !important;
        border-color: #0d6efd !important;
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1) !important;
    }

    .btn-submit {
        padding: 15px;
        border-radius: 12px;
        font-weight: 800;
        letter-spacing: 1px;
        margin-top: 20px;
        background-color: #0d6efd;
        border: none;
        transition: all 0.3s ease;
    }

    .btn-submit:hover {
        background-color: #0b5ed7;
        transform: translateY(-2px);
    }
</style>
</head>
<body>
    <div class="chat-card">
        <div class="row g-4">
            <div class="col-md-6">
                <textarea id="message" class="form-control" placeholder="Введите сообщение..."></textarea>
                <button id="sendBtn" class="btn btn-primary btn-submit w-100">Submit</button>
            </div>
            <div class="col-md-6">
                <div id="response" class="response-box">Response</div>
            </div>
        </div>
    </div>


<script>
const btn = document.getElementById("sendBtn");

btn.addEventListener("click", async () => {
    const message = document.getElementById("message").value;
    const responseBox = document.getElementById("response");

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
            
        });
        btn.disabled = true;
        btn.innerText = "Отправка...";

        const data = await res.json();
       responseBox.innerText = data.reply || "Нет ответа от сервера";

    } catch (err) {
        console.error(err);
        responseBox.innerText = "Ошибка запроса";
    }
    finally {
                btn.disabled = false;
                btn.innerText = "submit";
            }
});
</script>

</body>
</html>
