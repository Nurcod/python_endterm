<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            justify-content: center;
            margin-top: 50px;
        }

        .chat {
            display: flex;
            gap: 20px;
            width: 600px;
        }

        textarea, .response {
            width: 100%;
            height: 200px;
            padding: 10px;
        }

        .response {
            border: 1px solid #ccc;
            background: #f5f5f5;
            white-space: pre-wrap;
        }

        button {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
        }

        .left, .right {
            flex: 1;
        }
    </style>
</head>
<body>

<div class="chat">
    <div class="left">
        <textarea id="message" placeholder="Введите сообщение..."></textarea>
        <button id="sendBtn">submit</button>
    </div>
    <div class="right">
        <div id="response" class="response">Response</div>
    </div>
</div>

<script>
const btn = document.getElementById("sendBtn");

btn.addEventListener("click", async () => {
    const message = document.getElementById("message").value;
    const responseBox = document.getElementById("response");

    try {
        const res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ message })
            
        });
        btn.disabled = true;
        btn.innerText = "Отправка...";

        const data = await res.json();
       responseBox.innerText = data.reply || "Нет ответа от сервера";

    } catch (err) {
        console.error(err);
        responseBox.innerText = "Ошибка запроса";
    }
    finally {
                btn.disabled = false;
                btn.innerText = "submit";
            }
});
</script>

</body>
</html>
