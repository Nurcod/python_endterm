<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница регистрации</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --error-color: #e74c3c;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
        }

        h1 { margin-top: 0; font-size: 24px; text-align: center; color: var(--text-color); }

        .form-group { margin-bottom: 15px; }

        label { display: block; margin-bottom: 8px; font-weight: 500; color: #666; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .error-text {
            color: var(--error-color);
            font-size: 12px;
            margin-top: 5px;
            display: block;
            min-height: 15px; /* Чтобы форма не дергалась */
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }

        button:hover { background-color: #357abd; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Регистрация</h1>
        <form id="regForm">
            <div class="form-group">
                <label for="email">Электронная почта</label>
                <input type="email" id="email" placeholder="name@example.com">
                <span id="emailError" class="error-text"></span>
            </div>
            
            <div class="form-group">
                <label for="password">Пароль</label>
                <input type="password" id="password" placeholder="Минимум 8 символов">
                <span id="passwordError" class="error-text"></span>
            </div>

            <button type="submit" id="submitBtn">Создать аккаунт</button>
            <div class="login-link">
                Уже есть аккаунт? <a href="enter.html">Войти</a>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('regForm');
        const btn = document.getElementById('submitBtn');
        const emailErr = document.getElementById('emailError');
        const passErr = document.getElementById('passwordError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. Сброс предыдущих ошибок
            emailErr.innerText = "";
            passErr.innerText = "";

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // 2. Валидация
            let hasError = false;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

            if (!emailRegex.test(email)) {
                emailErr.innerText = "Enter a correct email";
                hasError = true;
            }

            if (!passwordRegex.test(password)) {
                passErr.innerText = "Required: 8+ characters, uppercase, lowercase, number and symbol.";
                hasError = true;
            }

            if (hasError) return;

            // 3. Отправка
            try {
                btn.disabled = true;
                btn.innerText = "Отправка...";

                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    emailErr.innerText = data.detail || "Ошибка регистрации";
                } else {
                    alert("Регистрация успешна!");
                    form.reset();
                }

            } catch (err) {
                emailErr.innerText = "Сервер недоступен";
            } finally {
                btn.disabled = false;
                btn.innerText = "Создать аккаунт";
            }
        });
    </script>

</body>
</html>
