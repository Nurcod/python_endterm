<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница регистрации</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        h1 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 5px; 
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: #764ba2;
            background-color: #fff;
            box-shadow: 0 0 8px rgba(118, 75, 162, 0.2);
        }

        .error-text {
            color: #e74c3c;
            font-size: 11px;
            margin-top: 4px;
            display: block;
            min-height: 15px;
            line-height: 1.2;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(to right, #667eea, #764ba2);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 15px;
        }

        button:hover {
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .login-link a {
            color: #764ba2;
            text-decoration: none;
            font-weight: bold;
            margin-left: 5px;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Register</h1>
        <form id="regForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="name@example.com">
                <span id="emailError" class="error-text"></span>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Минимум 8 символов">
                <span id="passwordError" class="error-text"></span>
            </div>

            <button type="submit" id="submitBtn">Create account</button>
            <div class="login-link">
                Have account?<a href="enter.html">enter</a>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('regForm');
        const btn = document.getElementById('submitBtn');
        const emailErr = document.getElementById('emailError');
        const passErr = document.getElementById('passwordError');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // 1. Сброс предыдущих ошибок
            emailErr.innerText = "";
            passErr.innerText = "";

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // 2. Валидация
            let hasError = false;

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

            if (!emailRegex.test(email)) {
                emailErr.innerText = "Enter a correct email";
                hasError = true;
            }

            if (!passwordRegex.test(password)) {
                passErr.innerText = "Required: 8+ characters, uppercase, lowercase, number and symbol.";
                hasError = true;
            }

            if (hasError) return;

            // 3. Отправка
            try {
                btn.disabled = true;
                btn.innerText = "Отправка...";

                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    emailErr.innerText = data.detail || "Ошибка регистрации";
                } else {
                    alert("Регистрация успешна!");
                    form.reset();
                }

            } catch (err) {
                emailErr.innerText = "Сервер недоступен";
            } finally {
                btn.disabled = false;
                btn.innerText = "Создать аккаунт";
            }
        });
    </script>

</body>
</html>
